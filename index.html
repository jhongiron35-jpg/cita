<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pregunta Especial</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e79a9a;
    font-family:'Segoe UI',sans-serif;
}

/* Tarjeta */
.card{
    width:80%;
    max-width:700px;
    background:#f2f2f2;
    padding:60px 40px;
    border-radius:30px;
    text-align:center;
}

/* ✨ Animación del nombre */
.nombre{
    font-size:36px;
    font-weight:bold;
    background: linear-gradient(45deg,#ff4f6d,#ff85a2,#ff4f6d);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: brillo 3s ease infinite, aparecer 2s ease;
}

/* Pregunta */
.pregunta{
    color:#ff4f6d;
    font-size:28px;
    margin-bottom:40px;
}

/* Botones */
button{
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

.no, .yes{
    background:#ff4f6d;
    color:white;
}

.yes:hover{
    transform:scale(1.1);
}

/* Animaciones */
@keyframes brillo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes aparecer{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

#mensaje{
    margin-top:30px;
    font-size:20px;
    color:#ff4f6d;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <div class="nombre">Señorita Kathery 💖</div>
    <div class="pregunta">¿Acepta tener una cita con Jesús?</div>

    <!-- ORDEN: NO NO SI -->
    <button class="no" id="no1">NO</button>
    <button class="no" id="no2">NO</button>
    <button class="yes" id="yesBtn">SI</button>

    <p id="mensaje"></p>
</div>

<script>
const no1 = document.getElementById("no1");
const no2 = document.getElementById("no2");
const yesBtn = document.getElementById("yesBtn");

function mover(boton){
    const x = Math.random() * 500;
    const y = Math.random() * 200;
    boton.style.position = "relative";
    boton.style.left = x + "px";
    boton.style.top = y + "px";
}

no1.addEventListener("mouseover", () => mover(no1));
no2.addEventListener("mouseover", () => mover(no2));

yesBtn.addEventListener("click", () => {
    document.getElementById("mensaje").innerText =
    "💖 Sabía que aceptarías. ¡Será una cita hermosa!";
});
</script>

</body>
</html>
